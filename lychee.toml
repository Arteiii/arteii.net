    accept = [200, 403, 999]

    exclude = [
    '%7B.*%7D',
    '\{.*\}',

    'http://127.0.0.1:8000',
    'http://localhost',

    '/resume'
    ]

    remap = [
        "^/icons/ /static/icons/",
        "^/assets/ /static/assets/",
        "/.well-known/ /static/.well-known/",
        "/landing-page/ /static/landing-page/"
    ]
