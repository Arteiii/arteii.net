name: Links

permissions:
  contents: read
  actions: write

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * *"
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - gh-pages

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >
            --root-dir "./" 
            --remap "^/icons/ static/assets/icons/"
            --remap "^/assets/ static/assets/"
            --remap "^/.well-known/ static/.well-known/"
            --remap "^/landing-page/ static/landing-page/"
            --cache 
            --max-cache-age 1d 
            .

      - name: Save lychee cache
        uses: actions/cache/save@v6
        if: always()
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}
