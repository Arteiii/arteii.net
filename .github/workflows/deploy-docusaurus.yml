name: deploy-docusaurus

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Generate Digital Business Card (vCard)
        run: |
          mkdir -p static/download

          AVATAR_B64=$(base64 -w 0 ./static/img/arteii_avatar_small.jpg)

          cat << EOF > static/download/ben_pilger.vcf
          BEGIN:VCARD
          VERSION:3.0
          FN:Ben Pilger
          N:Pilger;Ben;;;
          TITLE:Systems & Security Engineer, IT Trainer
          TEL;TYPE=CELL,VOICE:+4916098641438
          EMAIL;TYPE=PREF,INTERNET:ben.pilger@arteii.net
          URL:https://arteii.net
          PHOTO;TYPE=JPEG;ENCODING=B:${AVATAR_B64}
          X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/ben-pilger/
          X-SOCIALPROFILE;TYPE=github:https://github.com/Arteiii
          X-SOCIALPROFILE;TYPE=xing:https://www.xing.com/profile/Ben_Pilger
          REV:$(date -u +'%Y%m%dT%H%M%SZ')
          END:VCARD
          EOF

      - name: Compile LaTeX to PDF via XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ./TEX
          root_file: |
            CV.tex
            RESUME.tex
          compiler: xelatex
          pre_compile: apk add font-jetbrains-mono

      - name: Convert LaTeX to PDF, MD and HTML
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc

          pandoc ./TEX/CV.tex -t markdown -o CV.md
          pandoc ./TEX/CV.tex -s -t html -o CV.html

          pandoc ./TEX/RESUME.tex -t markdown -o RESUME.md
          pandoc ./TEX/RESUME.tex -s -t html -o RESUME.html

      - name: Move artifacts to Docusaurus folders
        run: |
          mkdir -p static/download

          cp ./TEX/CV.pdf static/download/CV.pdf
          cp CV.html static/download/CV.html
          cp CV.md static/download/CV.md

          cp ./TEX/RESUME.pdf static/download/RESUME.pdf
          cp RESUME.html static/download/RESUME.html
          cp RESUME.md static/download/RESUME.md

      - name: Set up Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies and build
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
